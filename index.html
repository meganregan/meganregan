<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Megan Regan</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Didact+Gothic&display=swap" rel="stylesheet">
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #f9f7f4;
      --ink: #1a1a18;
      --muted: #888880;
      --accent: #c8a96e;
      --line: #e2ddd8;
    }

    html, body {
      height: 100%;
    }

    body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Didact Gothic', sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 2rem;
    }

    .card {
      max-width: 480px;
      width: 100%;
      opacity: 0;
      transform: translateY(18px);
      animation: fadeUp 1s cubic-bezier(.22,.6,.36,1) forwards;
      animation-delay: 0.2s;
    }

    @keyframes fadeUp {
      to { opacity: 1; transform: translateY(0); }
    }

    .rule {
      width: 36px;
      height: 1px;
      background: var(--accent);
      margin-bottom: 2rem;
    }

    h1 {
      font-family: 'Cormorant Garamond', serif;
      font-weight: 300;
      font-size: clamp(2.8rem, 8vw, 4rem);
      letter-spacing: -0.01em;
      line-height: 1.05;
      margin-bottom: 0.5rem;
    }

    h1 em {
      font-style: italic;
      color: var(--accent);
    }

    .tagline {
      font-family: 'Didact Gothic', sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 2.5rem;
    }

    .divider {
      width: 100%;
      height: 1px;
      background: var(--line);
      margin-bottom: 2.5rem;
    }

    .contacts {
      display: flex;
      flex-direction: column;
      gap: 0.9rem;
      margin-bottom: 2.5rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.75rem;
    }

    .contact-label {
      font-size: 0.65rem;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--muted);
      width: 52px;
      flex-shrink: 0;
    }

    .contact-value {
      font-family: 'Cormorant Garamond', serif;
      font-size: 1.05rem;
      color: var(--ink);
      text-decoration: none;
      transition: color 0.2s;
    }

    .contact-value:hover {
      color: var(--accent);
    }

    .socials {
      display: flex;
      gap: 1.25rem;
      padding-top: 0.5rem;
    }

    .social-link {
      display: flex;
      align-items: center;
      gap: 0.4rem;
      font-size: 0.7rem;
      letter-spacing: 0.15em;
      text-transform: uppercase;
      color: var(--muted);
      text-decoration: none;
      transition: color 0.2s;
    }

    .social-link:hover {
      color: var(--accent);
    }

    .social-link svg {
      width: 14px;
      height: 14px;
      fill: currentColor;
    }

    .footer-rule {
      width: 100%;
      height: 1px;
      background: var(--line);
      margin-top: 2.5rem;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="rule"></div>
    <h1>Megan <em>Regan</em></h1>
    <p class="tagline">Coolest person alive</p>
    <img src="dog.jpg" alt="My dog" style="width: 250px; border-radius: 12px; margin: 1rem 0;">
    <div class="divider"></div>
    <div class="contacts">
      <div class="contact-item">
        <span class="contact-label">Email</span>
        <a class="contact-value" href="mailto:meganregan.w@gmail.com">meganregan.w@gmail.com</a>
      </div>
    </div>
    <div class="socials">
      <a class="social-link" href="https://instagram.com/meganregan.g" target="_blank" rel="noopener">
